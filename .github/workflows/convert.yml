name: Convert job Issues to JSON
on:
  issues:
    types: [labeled]
  workflow_dispatch:
permissions:
  contents: write
  issues: write
jobs:
  convert:
    if: contains(join(fromJson(toJson(github.event.issue.labels)).*.name, ','), 'job')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Normalize and validate body (accepts plain, fenced, or double-encoded JSON)
        id: norm
        shell: bash
        run: |
          set -e
          RAW=$(cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
          )
          CLEAN=$(printf "%s" "$RAW" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          # Extract first fenced JSON block anywhere in the body
          BLOCK=$(printf "%s" "$CLEAN" | awk '
            BEGIN{inblk=0}
            /^```(json|JSON)?[[:space:]]*$/ {inblk=1; next}
            /^```[[:space:]]*$/ {if(inblk){exit}}
            {if(inblk) print}
          ')

          # If a fenced block was found, use it
          if [ -n "${BLOCK//[[:space:]]/}" ]; then
            CLEAN="$BLOCK"
          fi

          if printf "%s" "$CLEAN" | jq -e . > /dev/null 2>&1; then
            TYPE=$(printf "%s" "$CLEAN" | jq -r 'type')
            if [ "$TYPE" = "string" ]; then
              INNER=$(printf "%s" "$CLEAN" | jq -r .)
              if printf "%s" "$INNER" | jq -e . > /dev/null 2>&1; then
                CLEAN="$INNER"
              else
                echo "❌ JSON string content is invalid."; exit 1
              fi
            fi
          else
            echo "❌ Issue body is not valid JSON."; exit 1
          fi
          mkdir -p jobs
          printf "%s" "$CLEAN" | jq . > jobs/_incoming.json
          SLUG=$(jq -r '.slug' jobs/_incoming.json)
          if [ -z "$SLUG" ] || [ "$SLUG" = "null" ]; then
            echo "❌ Missing 'slug' field in JSON."; exit 1
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
      - name: Save jobs file
        run: |
          cp jobs/_incoming.json "jobs/${{ steps.norm.outputs.slug }}.json"
          rm jobs/_incoming.json
      - name: Rebuild jobs.json index
        run: |
          set -e
          shopt -s nullglob
          FILES=(jobs/*.json)
          echo "Found ${#FILES[@]} job files."
          
          for file in "${FILES[@]}"; do
            if [ "$(basename "$file")" != "jobs.json" ]; then
              echo "Testing $file..."
              if ! jq -e . "$file" > /dev/null 2>&1; then
                echo "❌ ERROR: $file contains invalid JSON"
                echo "Content preview:"
                head -c 500 "$file"
                exit 1
              fi
            fi
          done
          
          VALID_FILES=()
          for f in "${FILES[@]}"; do
            if [ "$(basename "$f")" != "jobs.json" ]; then
              VALID_FILES+=("$f")
            fi
          done
          
          if [ ${#VALID_FILES[@]} -eq 0 ]; then
            echo "[]" > jobs/jobs.json
          else
            echo "Combining files into jobs.json index..."
            jq -s '[ .[] | del(.descriptionHtml) ]' "${VALID_FILES[@]}" > jobs/jobs.json
          fi
      - name: Commit JSON and index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs/*.json
          git commit -m "Auto update job files + index" || echo "No changes"
          git push
      - name: Comment and close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: |
            ✅ Listing published or updated.
            File: /jobs/${{ steps.norm.outputs.slug }}.json
            Index updated: /jobs/jobs.json
