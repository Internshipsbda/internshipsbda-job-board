<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Internship Listing | Internship Insights Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #FF6D33;
      --ink: #1a1a1a;
      --muted: #4a4a4a;
      --bg: #FFF4E6;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background-color: var(--bg);
      color: var(--ink);
      padding: 2rem;
      min-height: 100vh;
    }

    #job-card {
      max-width: 800px;
      margin: auto;
      padding: 2rem 0;
    }

    .header {
      font-family: 'Raleway', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--ink);
      text-align: center;
    }

    .company {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--ink);
      text-align: center;
    }

    .location {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      color: var(--muted);
    }

    .location svg {
      width: 18px;
      height: 18px;
      margin-right: 6px;
      stroke: var(--muted);
    }

    .details {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .detail-item {
      color: var(--muted);
    }

    .detail-item strong {
      color: var(--ink);
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: var(--ink);
    }

    ul {
      padding-left: 0;
      margin-bottom: 1rem;
      color: var(--ink);
      list-style: none;
    }

    ul li {
      padding-left: 1.5rem;
      margin-bottom: 0.75rem;
      position: relative;
    }

    ul li:before {
      content: "▪";
      position: absolute;
      left: 0;
      font-size: 1.2rem;
      line-height: 1;
    }

    .description {
      margin-top: 1rem;
      line-height: 1.6;
      color: var(--ink);
    }

    .description strong {
      display: block;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .apply-button {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background-color: var(--brand);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .apply-button:hover {
      background-color: #e55a1f;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(255, 109, 51, 0.3);
    }

    .notfound {
      max-width: 600px;
      margin: 4rem auto;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }

    .back {
      display: block;
      margin: 0 auto 1.5rem;
      text-align: center;
      font-weight: 600;
      color: var(--brand);
      text-decoration: none;
    }

    .back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <a class="back" href="job-board.html">← Back to all internships</a>
  
  <div id="job-card">
    <p>Loading internship details...</p>
  </div>

  <script>
    const slug = new URLSearchParams(location.search).get("slug");
    const BASE = "https://raw.githubusercontent.com/Internshipsbda/internshipsbda-job-board/main/jobs/";

    function formatDate(dateStr) {
      if (!dateStr) return "TBD";
      const date = new Date(dateStr);
      return date.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function formatDescription(desc) {
      return desc
        .replace(/\\n\\n/g, '<br><br>')
        .replace(/\\n/g, '<br>')
        .replace(/(Duties and Responsibilities|Qualifications|Alignment with Core Values)/g, '<strong>$1</strong>');
    }

    function renderJob(job) {
      const el = document.getElementById('job-card');
      const applyLink = job.applyLink || "#";
      const description = job.descriptionHtml ? formatDescription(job.descriptionHtml) : "<p>No description provided.</p>";
      const location = job.location || "Bermuda";
      const isPaid = job.isPaid ? "Paid" : "Unpaid";
      const workStyle = job.workStyle;
      const duration = job.duration;
      const type = job.type || "Internship";

      // Build details array, only including items that exist
      let details = [];
      details.push(`<span class="detail-item"><strong>Type:</strong> ${type}</span>`);
      if (workStyle) details.push(`<span class="detail-item"><strong>Work Style:</strong> ${workStyle}</span>`);
      if (duration) details.push(`<span class="detail-item"><strong>Duration:</strong> ${duration}</span>`);
      if (job.applyBy) details.push(`<span class="detail-item"><strong>Apply by:</strong> ${formatDate(job.applyBy)}</span>`);
      details.push(`<span class="detail-item"><strong>Compensation:</strong> ${isPaid}</span>`);
      if (job.startDate) details.push(`<span class="detail-item"><strong>Start:</strong> ${formatDate(job.startDate)}</span>`);
      if (job.endDate) details.push(`<span class="detail-item"><strong>End:</strong> ${formatDate(job.endDate)}</span>`);

      el.innerHTML = `
        <div class="header">${job.title}</div>
        <div class="company">${job.company}</div>

        <div class="location">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.657 0 3-1.343 3-3S13.657 5 12 5 9 6.343 9 8s1.343 3 3 3z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.341A8 8 0 104.572 15.34 11.954 11.954 0 0112 21a11.954 11.954 0 017.428-5.659z"/>
          </svg>
          ${location}
        </div>

        <div class="details">
          ${details.join('\n          ')}
        </div>

        <div class="section-title">Description</div>
        <div class="description">${description}</div>

        ${job.applyLink ? `<a class="apply-button" href="${applyLink}" target="_blank">Apply Now</a>` : ''}
      `;
    }

    function notFound() {
      document.getElementById('job-card').innerHTML = `<p class="notfound">Job not found. The link may be incorrect or the posting expired.</p>`;
    }

    if (!slug) {
      notFound();
    } else {
      fetch(`${BASE}${slug}.json`)
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(job => {
          document.title = `${job.title} at ${job.company} | Internships`;
          renderJob(job);
        })
        .catch(notFound);
    }
  </script>
</body>
</html>
